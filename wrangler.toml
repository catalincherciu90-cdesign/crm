name = "crm"
main = "./dist/_worker.js/index.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Fisierele statice generate de Astro (deployment ca Worker cu assets).
[assets]
directory = "./dist"
binding = "ASSETS"

# Baza de date D1 — creata cu:  wrangler d1 create crm-db
[[d1_databases]]
binding = "DB"
database_name = "crm-db"
database_id = "ad4c0c09-e8a9-4208-9e4e-6126f50feda0"
migrations_dir = "migrations"
